<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F6F3; --blue: #2563EB; --text: #111827;
      --text-3: #9CA3AF; --border: #E5E7EB; --surface: #FFFFFF;
      --icon: #6B7280;
    }
    [data-theme="dark"] {
      --bg: #0F1117; --blue: #3B82F6; --text: #F1F5F9;
      --text-3: #475569; --border: #2D3148; --surface: #1A1D27;
      --icon: #94A3B8;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Theme toggle ── */
    .theme-btn {
      position: fixed; top: 1.25rem; right: 1.25rem;
      width: 36px; height: 36px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.3s;
      padding: 0;
    }
    .theme-btn:hover { border-color: var(--blue); }
    .theme-btn svg { transition: opacity 0.2s, transform 0.3s; }
    .theme-btn .icon-moon { display: block; }
    .theme-btn .icon-sun  { display: none; }
    [data-theme="dark"] .theme-btn .icon-moon { display: none; }
    [data-theme="dark"] .theme-btn .icon-sun  { display: block; }

    .wrap { text-align: center; animation: up 0.6s ease both; }
    @keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .logo { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue); margin-bottom: 2rem; }
    h1 { font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 300; letter-spacing: -2px; line-height: 1.05; margin-bottom: 0.5rem; }
    h1 strong { font-weight: 600; color: var(--blue); }
    .sub { font-size: 0.85rem; color: var(--text-3); margin-bottom: 3rem; }
    .btn {
      display: inline-block; background: var(--blue); color: #fff;
      padding: 0.9rem 2.5rem; font-size: 0.875rem; font-weight: 500;
      text-decoration: none; border-radius: 8px; transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .tags { margin-top: 3rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .tag { font-size: 0.7rem; color: var(--text-3); border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 100px; }
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Переключить тему">
    <!-- Луна — для светлой темы -->
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" stroke="#6B7280" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Солнце — для тёмной темы -->
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="3" stroke="#94A3B8" stroke-width="1.25"/>
      <line x1="8" y1="1" x2="8" y2="2.5"   stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="8" y1="13.5" x2="8" y2="15" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="1" y1="8" x2="2.5" y2="8"   stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="13.5" y1="8" x2="15" y2="8" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="2.93" y1="2.93" x2="3.99" y2="3.99" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="12.01" y1="12.01" x2="13.07" y2="13.07" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="13.07" y1="2.93" x2="12.01" y2="3.99" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="3.99" y1="12.01" x2="2.93" y2="13.07" stroke="#94A3B8" stroke-width="1.25" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="wrap">
    <div class="logo">Smart Timer</div>
    <h1>Меньше<br>отвлечений.<br><strong>Больше дела.</strong></h1>
    <p class="sub">Pomodoro-таймер с фокусом на результат</p>
    <a href="/index" class="btn">Начать →</a>
    <div class="tags">
      <span class="tag">фокус</span>
      <span class="tag">задачи</span>
      <span class="tag">заметки</span>
      <span class="tag">lofi</span>
    </div>
  </div>

  <script>
    const saved = localStorage.getItem('st_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      localStorage.setItem('st_theme', next);
      document.documentElement.setAttribute('data-theme', next);
    }

    // Переход на страницу настроек по Enter
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        window.location.href = '/index';
      }
    });
  </script>
</body>
</html>
